<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureCarX</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<!-- min-h-screen: altura mínima de pantalla completa, flex: diseño flexible, items-center: centra verticalmente, justify-center: centra horizontalmente, p-4: padding alrededor, bg-gray-100: fondo gris claro -->
<body class="min-h-screen flex items-center justify-center p-4 bg-gray-100 ">
    <!-- Tarjeta w-full: ancho completo, max-w-md: ancho máximo medio predefinido (448px), p-8: padding grande, rounded-2xl: bordes muy redondeados, bg-white: fondo blanco, shadow-xl: sombra grande -->
    <div class="w-full max-w-md p-8 rounded-2xl bg-white  shadow-xl ">
       <!--Titulo centrado text-center: centra el texto, mb-6: margen inferior, text-2xl: tamaño grande, font-bold: negrita, text-gray-800: color gris oscuro -->
        <h1 class="text-center mb-6 text-2xl font-bold text-gray-800 ">SecureCarX</h1>
        <!-- Formulario espacio vertical entre elementos hijos -->
        <div id="predictionForm" class="space-y-4">
            <div>
                <!-- block: ocupa toda la línea, text-sm: texto pequeño, font-semibold: seminegrita, text-gray-700: gris medio, mb-1: margen inferior pequeño -->
                <label class="block text-sm font-semibold text-gray-700 mb-1">Kilómetros del Vehículo</label>
                 <!-- px-4: padding horizontal, py-2: padding vertical, border border-gray-300: borde gris claro, rounded-lg: bordes redondeados, focus:ring-2: resalta el input grosor 2, focus:ring-blue-500: color azul del resalte, focus:outline-none: quita el borde por defecto del navegador -->
                <input type="number" id="kms" required placeholder="Ej: 45000" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Año del Vehículo</label>
                <input type="number" id="year" required placeholder="Ej: 2018" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Prima Anual (Euros)</label>
                <input type="number" id="premium" required placeholder="Ej: 450" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>
            <!-- hover:bg-blue-700: azul más oscuro al pasar el ratón, text-white: texto blanco, font-bold: negrita, py-2 px-4: padding vertical y horizontal, rounded-lg: bordes redondeados, transition duration-200: animación suave de 200ms al pasar el raton cambia color a azul mas intenso durante 200ms-->
            <button type="button" id="btnCalcular" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition duration-200"> Calcular Indemnización</button>
        </div>

        <div id="resultBlock" class="mt-6 p-4 bg-green-50 border border-green-200 rounded-xl text-center">
            <p class="text-sm text-green-700 font-medium">Coste de Indemnización Estimado</p>
            <p id="resultValue" class="text-3xl font-extrabold text-green-600 mt-1">0.00€</p>
        </div>

    </div>

    <script src="js/script.js"></script>

</body>
</html>
